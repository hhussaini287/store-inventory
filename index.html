<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store App</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.header { display:flex; justify-content:center; gap:10px; }
.logo { width:50px; }
.container { max-width:500px; margin:auto; background:white; padding:20px; }
.hidden { display:none; }
input, button { width:100%; margin:5px 0; padding:10px; }
table { width:100%; margin-top:20px; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
</style>
</head>

<body>

<header class="header">
  <img src="logo.png" id="logo" class="logo">
  <h2 id="storeName">My Store</h2>
</header>

<div class="container">

<div id="auth">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">
  <button onclick="logout()">Logout</button>

  <h3>Store Settings</h3>
  <input placeholder="Store Name" oninput="changeStoreName(this.value)">
  <input type="file" onchange="uploadLogo(event)">

  <h3>Add Product</h3>
  <input id="productName" placeholder="Name">
  <input id="productPrice" type="number" placeholder="Price">
  <input id="productQty" type="number" placeholder="Quantity">
  <button onclick="saveProduct()">Save</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>Price</th><th>Qty</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

</div>

<script>
const API = "http://localhost:3000"; // change after deploy
let editId = null;

async function register() {
  await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  alert("Registered");
}

async function login() {
  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    auth.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadProducts();
  }
}

async function loadProducts() {
  const res = await fetch(API + "/products", {
    headers:{ Authorization: localStorage.getItem("token") }
  });

  const products = await res.json();
  productTable.innerHTML = "";

  products.forEach(p => {
    productTable.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.qty}</td>
        <td>
          <button onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
          <button onclick='deleteProduct("${p._id}")'>Delete</button>
        </td>
      </tr>
    `;
  });
}

async function saveProduct() {
  const token = localStorage.getItem("token");

  const data = {
    name: productName.value,
    price: productPrice.value,
    qty: productQty.value
  };

  if (editId) {
    await fetch(API + "/products/" + editId, {
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        Authorization: token
      },
      body: JSON.stringify(data)
    });
    editId = null;
  } else {
    await fetch(API + "/products", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization: token
      },
      body: JSON.stringify(data)
    });
  }

  loadProducts();
}

function editProduct(p) {
  productName.value = p.name;
  productPrice.value = p.price;
  productQty.value = p.qty;
  editId = p._id;
}

async function deleteProduct(id) {
  await fetch(API + "/products/" + id, {
    method:"DELETE",
    headers:{ Authorization: localStorage.getItem("token") }
  });
  loadProducts();
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function changeStoreName(name) {
  storeName.innerText = name;
  localStorage.setItem("storeName", name);
}

function uploadLogo(e) {
  const reader = new FileReader();
  reader.onload = (evt) => {
    logo.src = evt.target.result;
    localStorage.setItem("logo", evt.target.result);
  };
  reader.readAsDataURL(e.target.files[0]);
}

window.onload = () => {
  if (localStorage.getItem("token")) {
    auth.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadProducts();
  }

  let name = localStorage.getItem("storeName");
  if (name) storeName.innerText = name;

  let logoData = localStorage.getItem("logo");
  if (logoData) logo.src = logoData;
};
</script>

</body>
</html>
